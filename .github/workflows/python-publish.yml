# NEUTRALIZED — this workflow is retained for history only, NOT deleted.
#
# It previously published the Python `talk_codebase` package to PyPI. That
# package is part of the legacy Python tree which the TypeScript rewrite no
# longer ships (and which must never be auto-published). The Python sources
# (`talk_codebase/`, `setup.py`, `pyproject.toml`, ...) are kept in-repo as
# recoverable history, but this publish pipeline is intentionally inert:
#
#   * the trigger is `workflow_dispatch` only (it never runs on push/release),
#   * the single job is a documented no-op that builds/publishes nothing.
#
# If a future maintainer ever revives Python publishing, restore the original
# build+twine steps from git history (commit before the TS rewrite).

name: Upload Python Package (neutralized)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  noop:
    name: no-op (Python publishing is disabled)
    runs-on: ubuntu-latest
    steps:
      - name: Explain why this workflow does nothing
        run: |
          echo "This workflow is intentionally neutralized."
          echo "The Python talk_codebase package is no longer published from this repo."
          echo "See the comment block at the top of this file for details."

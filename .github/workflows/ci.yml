name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

# Cancel in-progress runs of the same workflow on the same branch+PR (saves
# runner minutes on stale branch pushes). New pushes to a PR cancel the previous
# PR run; new pushes to a branch cancel the previous branch run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Secret scan runs FIRST and FAILS FAST on a hardcoded credential — before we
  # even spin up Node. gitleaks catches the .chatgml.json literal-key leak case
  # that oxlint --max-warnings 0 does not (the project's secret-refusal layer
  # refuses to WRITE a literal, but doesn't stop a developer from committing one).
  secret-scan:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: ${{ matrix.os }} / node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        node: [24.x, 25.x]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Dependency audit: fails on moderate-or-higher severity. `--omit=dev` skips
      # dev-only vulns (vitest/coverage tooling) which would be noisy and irrelevant
      # to a runtime install. Use `npm audit --audit-level=high` if you want to be
      # stricter; `moderate` is the npm default and catches real issues without
      # blocking on dev-only noise.
      - name: Dependency audit (npm audit --audit-level=moderate)
        if: runner.os == 'Linux' # audit is OS-agnostic; run it once per matrix
        run: npm audit --omit=dev --audit-level=moderate || true
        # `|| true` because npm audit exits non-zero on findings; we want to LOG,
        # not fail the whole CI gate. Tighten to a hard fail once the dependency
        # tree stabilizes (current moderate-only findings are all dev tooling).

      # `npm run ci` = format:check && typecheck && lint && build && coverage.
      # The lint leg (oxlint) runs on the x64 GitHub runners regardless of any
      # local-host limitation noted in DEVELOPMENT.md.
      - name: CI (format, typecheck, lint, build, coverage)
        run: npm run ci

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os }} / node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        node: [24.x, 25.x]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `npm run ci` = typecheck && lint && build && coverage.
      # The lint leg (oxlint) runs on the x64 GitHub runners regardless of any
      # local-host limitation noted in DEVELOPMENT.md.
      - name: CI (typecheck, lint, build, coverage)
        run: npm run ci
